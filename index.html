<!DOCTYPE html>
<html>
<head>
  <title>Carrier Payment Status</title>
  <style>
    body { font-family: Arial; padding: 40px; }
    input, button { padding: 10px; margin: 5px; }
    .card { margin-top: 20px; padding: 20px; border: 1px solid #ccc; }
  </style>
</head>
<body>

<h2>Carrier Payment Status</h2>

<input id="dot" placeholder="DOT Number" />
<input id="search" placeholder="Load / Invoice #" />
<button onclick="search()">Search</button>

<div id="result"></div>

<script>
async function search() {
  const dot = document.getElementById("dot").value;
  const searchVal = document.getElementById("search").value;

  const res = await fetch(`/search?dot=${dot}&search=${searchVal}`);
  const data = await res.json();

  const el = document.getElementById("result");

  if (data.status !== "success") {
    el.innerHTML = "<div class='card'>Not Found</div>";
    return;
  }

  const p = data.payment;

  el.innerHTML = `
    <div class="card">
      <b>Status:</b> ${p.status}<br/>
      <b>Amount Paid:</b> $${p.amount}<br/>
      <b>Invoice:</b> $${p.invoice_amount}<br/>
      <b>Fee:</b> $${p.fee}<br/>
      <b>Reference:</b> ${p.reference_id}<br/>
      <b>Load #:</b> ${p.load_number || "N/A"}<br/>
      <b>Date:</b> ${p.created}
    </div>
  `;
}
</script>

</body>
</html>
