<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrier Payment Portal</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --brand:#2563eb;
      --brand-dark:#1d4ed8;
      --ok:#15803d;
      --ok-bg:#ecfdf5;
      --ok-line:#bbf7d0;
      --warn:#b45309;
      --warn-bg:#fff7ed;
      --warn-line:#fed7aa;
      --bad:#b91c1c;
      --bad-bg:#fef2f2;
      --bad-line:#fecaca;
      --info:#1d4ed8;
      --info-bg:#eff6ff;
      --info-line:#bfdbfe;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      background:#111827;
      color:#fff;
      padding:18px 24px;
      font-size:20px;
      font-weight:700;
    }

    .wrap{
      max-width:1020px;
      margin:0 auto;
      padding:24px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 10px 28px rgba(17,24,39,.06);
      padding:22px;
      margin-bottom:18px;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .hero h1{
      margin:0 0 6px 0;
      font-size:28px;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      margin:0;
      line-height:1.5;
      max-width:760px;
    }

    .search-grid{
      display:grid;
      grid-template-columns:1fr 1fr auto;
      gap:12px;
      margin-top:18px;
    }

    @media (max-width: 760px){
      .search-grid{
        grid-template-columns:1fr;
      }

      .grid-2{
        grid-template-columns:1fr !important;
      }

      .kv{
        grid-template-columns:1fr !important;
        gap:4px !important;
      }
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
    }

    input{
      width:100%;
      padding:14px;
      border:1px solid var(--line);
      border-radius:12px;
      font-size:15px;
      background:#fff;
    }

    button{
      align-self:end;
      height:48px;
      border:none;
      border-radius:12px;
      background:var(--brand);
      color:#fff;
      padding:0 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

    button:hover{
      background:var(--brand-dark);
    }

    button:disabled{
      opacity:.7;
      cursor:default;
    }

    .section-title{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      margin-bottom:12px;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .kv{
      display:grid;
      grid-template-columns:180px 1fr;
      gap:10px;
      padding:8px 0;
      border-bottom:1px solid var(--line);
    }

    .kv:last-child{
      border-bottom:none;
    }

    .k{
      color:var(--muted);
      font-size:14px;
    }

    .v{
      font-size:14px;
      font-weight:700;
      word-break:break-word;
    }

    .pill{
      display:inline-block;
      border-radius:999px;
      background:#eff6ff;
      color:#1d4ed8;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      margin:4px 6px 0 0;
    }

    .payment-card{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      margin-top:14px;
      background:#fcfcfd;
    }

    .status-banner{
      border-radius:14px;
      padding:14px 16px;
      font-weight:700;
      margin-bottom:16px;
    }

    .status-payment{
      background:var(--ok-bg);
      color:var(--ok);
      border:1px solid var(--ok-line);
    }

    .status-load{
      background:var(--info-bg);
      color:var(--info);
      border:1px solid var(--info-line);
    }

    .status-notfound{
      background:var(--warn-bg);
      color:var(--warn);
      border:1px solid var(--warn-line);
    }

    .payment-status{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .status-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }

    .chip-ok{
      color:var(--ok);
      background:var(--ok-bg);
      border-color:var(--ok-line);
    }

    .chip-warn{
      color:var(--warn);
      background:var(--warn-bg);
      border-color:var(--warn-line);
    }

    .chip-bad{
      color:var(--bad);
      background:var(--bad-bg);
      border-color:var(--bad-line);
    }

    .result-empty{
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .error-box{
      border:1px solid var(--bad-line);
      background:var(--bad-bg);
      color:#991b1b;
      border-radius:12px;
      padding:14px;
      font-size:14px;
    }

    .footer-note{
      color:var(--muted);
      font-size:12px;
      margin-top:8px;
      line-height:1.5;
    }

    .timeline{
      margin-top:14px;
      padding-top:8px;
    }

    .timeline-row{
      display:flex;
      gap:12px;
      align-items:flex-start;
      margin:10px 0;
    }

    .timeline-dot{
      width:12px;
      height:12px;
      border-radius:999px;
      margin-top:4px;
      background:#d1d5db;
      flex:0 0 12px;
    }

    .timeline-dot.active{
      background:var(--brand);
    }

    .timeline-content{
      flex:1;
    }

    .timeline-title{
      font-size:13px;
      font-weight:700;
    }

    .timeline-sub{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }
  </style>
</head>
<body>
  <div class="topbar">Carrier Payment Portal</div>

  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div>
          <h1>Check load or payment status</h1>
          <p class="sub">
            Enter your DOT number and load number / reference ID.
            This portal checks both load records and payment transactions.
          </p>
        </div>
      </div>

      <div class="search-grid">
        <div>
          <label for="dot">DOT Number</label>
          <input id="dot" placeholder="Enter DOT number" />
        </div>

        <div>
          <label for="reference">Load Number / Reference ID</label>
          <input id="reference" placeholder="Enter load number or reference ID" />
        </div>

        <button id="searchBtn" onclick="lookup()">Search</button>
      </div>

      <div class="footer-note">
        Depending on the RoadSync record, this value may match the transaction reference ID, invoice number, or load number.
      </div>
    </div>

    <div id="messageSection"></div>
    <div id="carrierSection"></div>
    <div id="resultSection"></div>
  </div>

  <script>
    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, function (s) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[s];
      });
    }

    function statusClass(value) {
      const s = String(value || "").toLowerCase();

      if (
        s.includes("paid") ||
        s.includes("complete") ||
        s.includes("completed") ||
        s.includes("delivered")
      ) {
        return "chip-ok";
      }

      if (
        s.includes("processing") ||
        s.includes("pending") ||
        s.includes("scheduled") ||
        s.includes("submitted") ||
        s.includes("created")
      ) {
        return "chip-warn";
      }

      if (
        s.includes("fail") ||
        s.includes("cancel") ||
        s.includes("void") ||
        s.includes("reject") ||
        s.includes("declin")
      ) {
        return "chip-bad";
      }

      return "chip-warn";
    }

    function formatDateTime(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;

      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZone: "America/Chicago",
        timeZoneName: "short"
      }).format(d);
    }

    function formatPaymentMethod(method) {
      if (!method) return "";

      const m = String(method).toUpperCase();

      if (m === "RTP" || m === "WALLET_RTP") return "Instant Payment";
      if (m === "ACH" || m === "WALLET_ACH") return "ACH";
      if (m === "CHECK" || m === "PAPER_CHECK") return "Paper Check";

      return method;
    }

    function clearResults() {
      document.getElementById("messageSection").innerHTML = "";
      document.getElementById("carrierSection").innerHTML = "";
      document.getElementById("resultSection").innerHTML = "";
    }

    async function lookup() {
      const dot = document.getElementById("dot").value.trim();
      const reference = document.getElementById("reference").value.trim();
      const button = document.getElementById("searchBtn");

      clearResults();

      if (!dot || !reference) {
        document.getElementById("messageSection").innerHTML = `
          <div class="card">
            <div class="result-empty">Enter both DOT number and load number / reference ID.</div>
          </div>
        `;
        return;
      }

      button.disabled = true;
      button.textContent = "Searching...";

      try {
        const res = await fetch(
          \`/api/search?dot=\${encodeURIComponent(dot)}&reference=\${encodeURIComponent(reference)}\`
        );

        const data = await res.json();

        if (!res.ok) {
          document.getElementById("messageSection").innerHTML = `
            <div class="card">
              <div class="error-box">
                ${esc(data.error || "Search failed")}
                ${data.details ? `<div style="margin-top:6px;">${esc(data.details)}</div>` : ""}
              </div>
            </div>
          `;
          return;
        }

        if (data.outcome === "not_found") {
          document.getElementById("messageSection").innerHTML = `
            <div class="card">
              <div class="status-banner status-notfound">No load or payment found</div>
              <div class="result-empty">
                No load or payment matched that DOT number and load/reference value.
              </div>
              ${
                data?.debug?.message
                  ? `<div class="footer-note">${esc(data.debug.message)}</div>`
                  : ""
              }
            </div>
          `;
          return;
        }

        renderCarrier(data.carrier);

        if (data.outcome === "payment_found") {
          document.getElementById("messageSection").innerHTML = `
            <div class="card">
              <div class="status-banner status-payment">Payment found</div>
              <div class="footer-note">A payment transaction exists for this load/reference.</div>
            </div>
          `;
          renderPaymentResult(data.payment);
          return;
        }

        if (data.outcome === "load_found_no_payment") {
          document.getElementById("messageSection").innerHTML = `
            <div class="card">
              <div class="status-banner status-load">Load found, payment not yet created</div>
              <div class="footer-note">${esc(data.message || "")}</div>
            </div>
          `;
          renderLoadResult(data.load);
          return;
        }
      } catch (err) {
        document.getElementById("messageSection").innerHTML = `
          <div class="card">
            <div class="error-box">
              Unable to complete the search.
              <div style="margin-top:6px;">${esc(err.message || "Unknown error")}</div>
            </div>
          </div>
        `;
      } finally {
        button.disabled = false;
        button.textContent = "Search";
      }
    }

    function renderCarrier(carrier) {
      const paymentTypes = Array.isArray(carrier.payment_types) ? carrier.payment_types : [];

      document.getElementById("carrierSection").innerHTML = `
        <div class="card">
          <div class="section-title">Carrier</div>
          <div class="grid-2">
            <div>
              <div class="kv">
                <div class="k">Carrier Name</div>
                <div class="v">${esc(carrier.name)}</div>
              </div>
              <div class="kv">
                <div class="k">DOT</div>
                <div class="v">${esc(carrier.dot)}</div>
              </div>
              <div class="kv">
                <div class="k">MC</div>
                <div class="v">${esc(carrier.mc)}</div>
              </div>
            </div>

            <div>
              <div class="kv">
                <div class="k">Verified</div>
                <div class="v">${carrier.verified === "" ? "Not available" : esc(String(carrier.verified))}</div>
              </div>
              <div class="kv">
                <div class="k">Factoring Company</div>
                <div class="v">${carrier.isFactoringCompany ? "Yes" : "No"}</div>
              </div>
              <div class="kv">
                <div class="k">Eligible Payment Methods</div>
                <div class="v">
                  ${
                    paymentTypes.length
                      ? paymentTypes.map(x => `<span class="pill">${esc(formatPaymentMethod(x))}</span>`).join("")
                      : "Not available"
                  }
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPaymentTimeline(payment) {
      const status = String(payment.transactionStatus || "").toLowerCase();
      const created = formatDateTime(payment.createdDatetime);
      const eta = formatDateTime(payment.eta);

      return `
        <div class="timeline">
          <div class="section-title">Payment Timeline</div>

          <div class="timeline-row">
            <div class="timeline-dot active"></div>
            <div class="timeline-content">
              <div class="timeline-title">Payment Created</div>
              <div class="timeline-sub">${esc(created || "Recorded")}</div>
            </div>
          </div>

          <div class="timeline-row">
            <div class="timeline-dot ${status.includes("processing") || status.includes("paid") || status.includes("complete") ? "active" : ""}"></div>
            <div class="timeline-content">
              <div class="timeline-title">Payment Processing</div>
              <div class="timeline-sub">${esc(status ? payment.transactionStatus : "Waiting")}</div>
            </div>
          </div>

          <div class="timeline-row">
            <div class="timeline-dot ${status.includes("paid") || status.includes("complete") ? "active" : ""}"></div>
            <div class="timeline-content">
              <div class="timeline-title">Expected Delivery</div>
              <div class="timeline-sub">${esc(eta || "Not available")}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPaymentResult(payment) {
      const payables = Array.isArray(payment.payables) ? payment.payables : [];

      document.getElementById("resultSection").innerHTML = `
        <div class="card">
          <div class="section-title">Payment</div>
          <div class="payment-card">
            <div class="payment-status">
              <div class="status-chip ${statusClass(payment.transactionStatus)}">
                ${esc(payment.transactionStatus || "Unknown")}
              </div>
            </div>

            <div class="kv"><div class="k">Reference ID</div><div class="v">${esc(payment.referenceId)}</div></div>
            <div class="kv"><div class="k">Transaction ID</div><div class="v">${esc(payment.transactionId)}</div></div>
            <div class="kv"><div class="k">External ID</div><div class="v">${esc(payment.externalId)}</div></div>
            <div class="kv"><div class="k">Amount</div><div class="v">${esc(payment.amount)}</div></div>
            <div class="kv"><div class="k">Payment Method</div><div class="v">${esc(formatPaymentMethod(payment.paymentMethod))}</div></div>
            <div class="kv"><div class="k">ETA</div><div class="v">${esc(formatDateTime(payment.eta))}</div></div>
            <div class="kv"><div class="k">Created</div><div class="v">${esc(formatDateTime(payment.createdDatetime))}</div></div>
            <div class="kv"><div class="k">Updated</div><div class="v">${esc(formatDateTime(payment.updatedDatetime))}</div></div>

            ${renderPaymentTimeline(payment)}

            ${
              payables.length
                ? `
                  <div style="margin-top:18px;">
                    <div class="section-title">Associated Payables</div>
                    ${payables.map(renderPayableCard).join("")}
                  </div>
                `
                : ""
            }
          </div>
        </div>
      `;
    }

    function renderLoadResult(load) {
      document.getElementById("resultSection").innerHTML = `
        <div class="card">
          <div class="section-title">Load</div>
          <div class="payment-card">
            <div class="payment-status">
              <div class="status-chip ${statusClass(load.transactionStatus || load.payableStatus || load.loadStatus)}">
                ${esc(load.transactionStatus || load.payableStatus || load.loadStatus || "LOAD FOUND")}
              </div>
            </div>

            <div class="kv"><div class="k">Load Number</div><div class="v">${esc(load.loadNumber)}</div></div>
            <div class="kv"><div class="k">Load ID</div><div class="v">${esc(load.loadId)}</div></div>
            <div class="kv"><div class="k">External ID</div><div class="v">${esc(load.externalId)}</div></div>
            <div class="kv"><div class="k">Amount</div><div class="v">${esc(load.amount)}</div></div>
            <div class="kv"><div class="k">Load Status</div><div class="v">${esc(load.loadStatus)}</div></div>
            <div class="kv"><div class="k">Payable ID</div><div class="v">${esc(load.payableId)}</div></div>
            <div class="kv"><div class="k">Payable Status</div><div class="v">${esc(load.payableStatus)}</div></div>
            <div class="kv"><div class="k">Transaction ID</div><div class="v">${esc(load.transactionId)}</div></div>
            <div class="kv"><div class="k">Transaction Status</div><div class="v">${esc(load.transactionStatus)}</div></div>
            <div class="kv"><div class="k">Payment Method</div><div class="v">${esc(formatPaymentMethod(load.paymentMethod))}</div></div>
          </div>
        </div>
      `;
    }

    function renderPayableCard(payable) {
      return `
        <div class="payment-card" style="margin-top:10px; background:#ffffff;">
          <div class="payment-status">
            <div class="status-chip ${statusClass(payable.payableStatus)}">
              ${esc(payable.payableStatus || "Unknown")}
            </div>
          </div>

          <div class="kv"><div class="k">Payable ID</div><div class="v">${esc(payable.payableId)}</div></div>
          <div class="kv"><div class="k">Invoice Number</div><div class="v">${esc(payable.invoiceNumber)}</div></div>
          <div class="kv"><div class="k">PO Number</div><div class="v">${esc(payable.poNumber)}</div></div>
          <div class="kv"><div class="k">Load ID</div><div class="v">${esc(payable.loadId)}</div></div>
          <div class="kv"><div class="k">Load Number</div><div class="v">${esc(payable.loadNumber)}</div></div>
          <div class="kv"><div class="k">Load External ID</div><div class="v">${esc(payable.loadExternalId)}</div></div>
          <div class="kv"><div class="k">Scheduled For Date</div><div class="v">${esc(formatDateTime(payable.scheduledForDate))}</div></div>
          <div class="kv"><div class="k">Amount</div><div class="v">${esc(payable.amount)}</div></div>
        </div>
      `;
    }

    document.getElementById("reference").addEventListener("keydown", function(e) {
      if (e.key === "Enter") lookup();
    });

    document.getElementById("dot").addEventListener("keydown", function(e) {
      if (e.key === "Enter") lookup();
    });
  </script>
</body>
</html>
