<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Carrier Payment Portal</title>

<style>

body{
font-family:Arial;
background:#f5f6f8;
margin:0;
}

.header{
background:#111827;
color:white;
padding:20px;
font-size:20px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
padding:12px;
border:1px solid #ccc;
border-radius:6px;
width:200px;
margin-right:10px;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.status{
font-weight:bold;
}

.paid{
color:green;
}

.pending{
color:orange;
}

.failed{
color:red;
}

</style>

</head>

<body>

<div class="header">
Carrier Payment Portal
</div>

<div class="container">

<div class="card">

<h3>Check Payment Status</h3>

<input id="dot" placeholder="DOT Number">
<input id="load" placeholder="Load / Invoice Number">

<button onclick="lookup()">Search</button>

</div>

<div id="carrier"></div>

<div id="payments"></div>

</div>

<script>

async function lookup(){

const dot = document.getElementById("dot").value;
const load = document.getElementById("load").value;

const res = await fetch(`/api/search?dot=${dot}&load=${load}`);

const data = await res.json();

const carrierDiv = document.getElementById("carrier");
const paymentDiv = document.getElementById("payments");

carrierDiv.innerHTML="";
paymentDiv.innerHTML="";

if(!data.carrier){

paymentDiv.innerHTML="<div class='card'>No payment found.</div>";

return;

}

carrierDiv.innerHTML = `
<div class="card">

<h3>${data.carrier.name}</h3>

DOT: ${data.carrier.dot}<br>
MC: ${data.carrier.mc}<br>
Verified: ${data.carrier.verified}<br>
Eligible Payment Methods: ${data.carrier.payment_types.join(", ")}

</div>
`;

data.payments.forEach(p=>{

let cls="pending";

if(p.status==="paid") cls="paid";
if(p.status==="failed") cls="failed";

paymentDiv.innerHTML += `

<div class="card">

<div class="status ${cls}">Status: ${p.status}</div>

Amount: $${p.amount}<br>
Payment Method: ${p.method}<br>
ETA: ${p.eta || "Processing"}<br>
Transaction ID: ${p.id}

</div>

`;

});

}

</script>

</body>
</html>
